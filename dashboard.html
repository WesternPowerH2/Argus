.chip-h2.active{background:#3B1C7A;border-color:#3B1C7A;color:#fff}
.result-count{font-size:11px;color:#aaa;white-space:nowrap}

.month-group{margin-bottom:10px}
.month-header{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.09em;padding:3px 4px 6px;border-bottom:1px solid #eee;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}

function chgClass(v){ return v.startsWith('+') ? 'up' : v==='nc' ? 'nc' : 'dn'; }
function chgLabel(v){ return v==='nc' ? '→ 보합' : v.startsWith('+') ? '▲ '+v : '▼ '+v; }
const clrMap = {up:'#D85A30', nc:'#639922', dn:'#185FA5'};

let activeFilter = 'all';

function getFilteredBriefs(){
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  return briefs.filter(b => {
    if(activeFilter==='hot' && !b.hot) return false;
    if(activeFilter==='pol' && !b.issues.some(i=>i.type==='pol')) return false;
    if(activeFilter==='h2'){
      const allText = [b.tags,...b.issues.map(i=>i.text),b.monitor||''].join(' ');
      if(!/수소|H2|hydrogen|그린|RFNBO|전해|암모니아.*수소|수소.*암모니아/i.test(allText)) return false;
    }
    if(q){
      const hay = [b.tags,b.label,b.monitor||'',...b.issues.map(i=>i.text)].join(' ').toLowerCase();
      return q.split(/\s+/).every(w=>hay.includes(w));
    }
    return true;
  });
}

const MONTH_KO = {'04':'4월','05':'5월','06':'6월','07':'7월','08':'8월','09':'9월','10':'10월','11':'11월','12':'12월','01':'1월','02':'2월','03':'3월'};

function renderDates(){
  const list = document.getElementById('dateList');
  const filtered = getFilteredBriefs();
  list.innerHTML = '';

  const rc = document.getElementById('resultCount');
  if(rc) rc.textContent = filtered.length === briefs.length
    ? `전체 ${briefs.length}건`
    : `${filtered.length}건 / 전체 ${briefs.length}건`;

  if(filtered.length === 0){
    list.innerHTML = '<div style="padding:24px 8px;text-align:center;color:#bbb;font-size:13px">검색 결과 없음</div>';
    document.getElementById('previewCol').innerHTML = '<div class="empty-msg">검색 결과가 없습니다</div>';
    return;
  }

  // 월별 그룹핑
  const groups = {};
  filtered.forEach(b=>{
    const ym = b.date.slice(0,7);
    if(!groups[ym]) groups[ym]=[];
    groups[ym].push(b);
  });

  let firstItem = null, firstBrief = null;
  Object.keys(groups).sort().reverse().forEach(ym=>{
    const [y,m] = ym.split('-');
    const section = document.createElement('div');
    section.className = 'month-group';
    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.innerHTML = `${y}년 ${MONTH_KO[m]}<span class="month-count">${groups[ym].length}건</span>`;
    section.appendChild(hdr);

    groups[ym].forEach(b=>{
      const isLatest = b===briefs[0];
      const el = document.createElement('div');
      el.className = 'date-item';
      el.dataset.date = b.date;
      el.innerHTML = `<div class="d-date">${b.label} (${b.day})${isLatest?'<span class="d-latest">최신</span>':''}</div>${b.hot?'<div class="d-badge">긴급이슈</div>':''}`;
      el.onclick = ()=>{
        document.querySelectorAll('.date-item').forEach(x=>x.classList.remove('selected'));
        el.classList.add('selected');
        renderPreview(b);
      };
      section.appendChild(el);
      if(!firstItem){ firstItem=el; firstBrief=b; }
    });
    list.appendChild(section);
  });

  // 자동 선택
  if(firstItem){ firstItem.classList.add('selected'); renderPreview(firstBrief); }
}

function renderCharts(){
  const sorted = briefs.slice().reverse();

  const ammOnly  = sorted.filter(b => b.prices.me !== null);
  const jklabOnly = sorted.filter(b => b.prices.jklab !== null);
  const opts = {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',borderColor:'#d8dde8',borderWidth:1,titleColor:'#0C447C',bodyColor:'#444',padding:10,callbacks:{label:c=>` ${c.dataset.label}: $${c.parsed.y}`}}},
    scales:{x:{grid:{color:'#f0f0f0'},ticks:{color:'#888',font:{size:11}}},y:{grid:{color:'#f0f0f0'},ticks:{color:'#888',font:{size:11},callback:v=>'$'+v}}}
  };
  new Chart(document.getElementById('priceChart'),{type:'line',data:{labels:ammOnly.map(b=>b.label),datasets:[
    {label:'중동 fob',      data:ammOnly.map(b=>b.prices.me),  borderColor:'#D85A30',borderWidth:2,pointRadius:4,tension:.3,fill:false},
    {label:'동아시아 cfr',  data:ammOnly.map(b=>b.prices.ea),  borderColor:'#185FA5',borderWidth:2,pointRadius:4,tension:.3,fill:false},
    {label:'NW유럽 cfr',    data:ammOnly.map(b=>b.prices.nwe), borderColor:'#639922',borderWidth:2,pointRadius:4,tension:.3,fill:false},
    {label:'미국걸프 cfr',  data:ammOnly.map(b=>b.prices.usg), borderColor:'#8B5CF6',borderWidth:2,pointRadius:4,tension:.3,fill:false,borderDash:[4,3]}
  ]},options:opts});
  new Chart(document.getElementById('jklabChart'),{type:'line',data:{labels:jklabOnly.map(b=>b.label),datasets:[
    {label:'JKLAB cfr 울산', data:jklabOnly.map(b=>b.prices.jklab), borderColor:'#0C447C',backgroundColor:'rgba(12,68,124,.1)',borderWidth:2.5,pointRadius:5,tension:.3,fill:true},

// 키보드 네비게이션 (↑↓로 날짜 이동)
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT') return;
  const items = [...document.querySelectorAll('.date-item')];
  if(!items.length) return;
  const idx = items.findIndex(el=>el.classList.contains('selected'));
  let next = -1;
  if(e.key==='ArrowDown') next = Math.min(idx+1, items.length-1);
  if(e.key==='ArrowUp')   next = Math.max(idx-1, 0);
  if(next>=0 && next!==idx){
    items[next].click();
    items[next].scrollIntoView({block:'nearest'});
    e.preventDefault();
  }
});

function switchTab(tab,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

}

function updateStatCards(){
  // 최신 암모니아 가격이 있는 브리핑
  const latestAmm = briefs.find(b=>b.prices.me!==null);
  // 전체 중 중동 fob 최고치
  const maxMe = briefs.filter(b=>b.prices.me).reduce((a,b)=>b.prices.me>a.val?{val:b.prices.me,label:b.label}:a,{val:0,label:''});
  // 최신 JKLAB
  const latestJk = briefs.find(b=>b.prices.jklab!==null);

  if(latestAmm){
    const me = document.getElementById('statMe');
    if(me){ me.querySelector('.stat-val').textContent='$'+latestAmm.prices.me; me.querySelector('.stat-sub').textContent=latestAmm.label+' 기준'; }
    const nwe = document.getElementById('statNwe');
    if(nwe){ nwe.querySelector('.stat-val').textContent='$'+latestAmm.prices.nwe; nwe.querySelector('.stat-sub').textContent=latestAmm.label+' 기준'; }
  }
  if(latestJk){
    const jk = document.getElementById('statJklab');
    if(jk){ jk.querySelector('.stat-val').textContent='$'+latestJk.prices.jklab; jk.querySelector('.stat-sub').textContent='45Q 미포함 · '+latestJk.label; }
  }
}
