<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — 수소·암모니아 브리핑 포털</title>
<script src="auth.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
  background: linear-gradient(135deg, #0a2d5c 0%, #0C447C 50%, #185FA5 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 40px 36px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
}

/* 로고 영역 */
.logo-wrap {
  text-align: center;
  margin-bottom: 28px;
}
.logo-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, #0C447C, #185FA5);
  border-radius: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  font-size: 24px;
}
.logo-title {
  font-size: 17px;
  font-weight: 700;
  color: #0C447C;
  line-height: 1.3;
}
.logo-sub {
  font-size: 12px;
  color: #888;
  margin-top: 4px;
}

/* 구분선 */
.divider {
  height: 0.5px;
  background: #e8e8e8;
  margin: 20px 0;
}

/* 입력 폼 */
.form-label {
  font-size: 12px;
  font-weight: 700;
  color: #555;
  letter-spacing: .04em;
  margin-bottom: 6px;
  display: block;
}
.form-input {
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid #e0e0e0;
  border-radius: 8px;
  font-size: 16px;
  font-family: inherit;
  color: #1a1a1a;
  letter-spacing: .08em;
  transition: border-color .15s, box-shadow .15s;
  outline: none;
  text-transform: uppercase;
}
.form-input:focus {
  border-color: #185FA5;
  box-shadow: 0 0 0 3px rgba(24,95,165,.12);
}
.form-input::placeholder {
  color: #bbb;
  letter-spacing: .02em;
  text-transform: none;
}

/* 에러 메시지 */
.error-msg {
  display: none;
  margin-top: 8px;
  padding: 10px 12px;
  background: #FFF4EF;
  border: 0.5px solid #F0997B;
  border-radius: 6px;
  font-size: 12px;
  color: #712B13;
  line-height: 1.5;
  white-space: pre-line;
}
.error-msg.show { display: block; }

/* 로그인 버튼 */
.btn-login {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  background: linear-gradient(135deg, #0C447C, #185FA5);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-login:hover { opacity: .92; }
.btn-login:active { transform: scale(.99); }
.btn-login:disabled { opacity: .6; cursor: not-allowed; }

/* 로딩 스피너 */
.spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
.spinner.show { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 안내 문구 */
.hint {
  text-align: center;
  font-size: 11px;
  color: #aaa;
  margin-top: 20px;
  line-height: 1.6;
}
.hint a { color: #185FA5; text-decoration: none; }

/* 하단 */
.footer {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: rgba(255,255,255,.5);
}
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon" style="background:transparent;box-shadow:none;padding:4px">
      <img src="https://www.iwest.co.kr/sites/iwest/images/contents/ci_8.png?v=20230608-001"
           style="height:44px;width:auto;object-fit:contain" alt="서부발전">
    </div>
    <div class="logo-title">수소·암모니아 브리핑 포털</div>
    <div class="logo-sub">서부발전 수소사업실 &nbsp;·&nbsp; Argus Media Daily</div>
  </div>

  <div class="divider"></div>

  <label class="form-label" for="empId">사번 입력</label>
  <input
    class="form-input"
    type="text"
    id="empId"
    placeholder=""
    maxlength="20"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
  />
  <div class="error-msg" id="errorMsg"></div>

  <button class="btn-login" id="loginBtn" onclick="handleLogin()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">포털 접속</span>
  </button>

  <div class="hint">
    접속 권한이 없거나 사번 등록이 필요한 경우<br>
    수소사업실 담당자에게 문의하세요.
  </div>
</div>

<script>
// 이미 로그인 상태면 대시보드로 바로 이동
if (AUTH.isLoggedIn()) {
  window.location.replace('dashboard.html');
}

// Enter 키 지원
document.getElementById('empId').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

function handleLogin() {
  const input   = document.getElementById('empId');
  const btn     = document.getElementById('loginBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  const errMsg  = document.getElementById('errorMsg');

  const employeeId = input.value.trim();
  if (!employeeId) {
    showError('사번을 입력해주세요.');
    input.focus();
    return;
  }

  btn.disabled = true;
  spinner.classList.add('show');
  btnText.textContent = '확인 중...';
  errMsg.classList.remove('show');

  const result = AUTH.login(employeeId);

  if (result.success) {
    btnText.textContent = '✓ 접속 중...';
    setTimeout(() => { window.location.replace('dashboard.html'); }, 400);
  } else {
    showError(result.message);
    btn.disabled = false;
    spinner.classList.remove('show');
    btnText.textContent = '포털 접속';
    input.select();
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
</script>

</body>
</html>
